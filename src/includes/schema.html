<!-- Schema.org JSON-LD pour la page d'accueil (optimise RDF/SEO) -->
{% if schema_type == 'home' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "DanielCraft",
  "url": "{{site_base}}",
  "inLanguage": "fr-FR",
  "publisher": { "@type": "Organization", "name": "DanielCraft", "url": "{{site_base}}" },
  "potentialAction": {
    "@type": "SearchAction",
    "target": { "@type": "EntryPoint", "urlTemplate": "{{site_base}}/blog?q={search_term_string}" },
    "query-input": "required name=search_term_string"
  }
}
</script>

{% if schema_type == 'project' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareSourceCode",
  "name": "{{project_title}}",
  "description": "{{project_description}}",
  "inLanguage": "fr-FR",
  "url": "{{page_url}}",
  "codeRepository": "{{project_github_url}}",
  "programmingLanguage": "{{project_language}}",
  "author": { "@type": "Person", "name": "Loïc DANIEL", "url": "{{site_base}}" },
  "copyrightYear": "{{project_year}}",
  "license": "{{project_licence}}"
}
</script>
{% endif %}
